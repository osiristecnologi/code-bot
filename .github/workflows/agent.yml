name: AI Code Bot 

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenAI SDK
        run: pip install --upgrade openai

      - name: Get changed files
        id: files
        run: |
          git diff --name-only origin/main...HEAD > changed.txt
          cat changed.txt

      - name: AI Code Review & Fix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 << 'EOF'
          import os
          from openai import OpenAI

          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])

          def fix_code(code):
              prompt = f"""
              Você é um assistente de código.
              Corrija apenas erros reais de sintaxe ou lógica simples.

              Regras:
              - NÃO explique nada
              - NÃO use markdown
              - Retorne apenas o código final corrigido

              Código:
              {code}
              """

              resp = client.chat.completions.create(
                  model="gpt-4o-mini",
                  messages=[{"role": "user", "content": prompt}],
                  temperature=0
              )

              return resp.choices[0].message.content.strip()

          if not os.path.exists("changed.txt"):
              exit(0)

          with open("changed.txt") as f:
              files = [x.strip() for x in f.readlines()]

          allowed = (".js", ".html", ".ts", ".tsx")

          for file in files:
              if not file.endswith(allowed):
                  continue

              if not os.path.exists(file):
                  continue

              with open(file, "r", encoding="utf-8") as f:
                  original = f.read()

              if len(original) < 20:
                  continue

              print("🧠 analisando:", file)

              try:
                  fixed = fix_code(original)

                  # proteção anti-lixo da IA
                  if fixed and "```" not in fixed and fixed != original:
                      with open(file, "w", encoding="utf-8") as f:
                          f.write(fixed)

                      print("✅ corrigido:", file)

              except Exception as e:
                  print("❌ erro:", file, e)

          EOF

      - name: Commit changes (if needed)
        run: |
          git config user.name "ai-bot-pro"
          git config user.email "ai-bot@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "Sem mudanças"
          else
            git commit -m "🤖 AI Pro fix"
          fi

      - name: Create Pull Request (auto)
        uses: peter-evans/create-pull-request@v6
        with:
          title: "🤖 AI Code Fix (Pro)"
          body: "Correções automáticas feitas pela IA"
          branch: ai-fix-${{ github.run_id }}
          base: main
